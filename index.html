<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopplist</title>
    
    <!-- PWA Meta tags -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/icon.svg">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- App Header -->
    <header class="app-header">
        <h1 id="header-title">Einkaufsliste</h1>
        <button id="btn-open-settings" class="btn-icon" aria-label="Einstellungen">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="app-content">
        <!-- View: Shopping List -->
        <section id="view-list" class="view active">
            <!-- Header Actions: Clear List -->
            <div class="list-meta-actions" style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
                <button id="btn-clear-list" class="btn-icon btn-danger-text" aria-label="Liste leeren" title="Komplette Liste leeren" style="display: flex; align-items: center; gap: 4px; font-size: 0.875rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Alle löschen
                </button>
            </div>
            
            <!-- Filters -->
            <div class="category-filters-container mb-15">
                <div class="category-filters" id="category-filters">
                    <button class="filter-chip active" data-cat="all">Alle</button>
                    <button class="filter-chip" data-cat="obst">Obst & Gemüse</button>
                    <button class="filter-chip" data-cat="kuehl">Kühlregal</button>
                    <button class="filter-chip" data-cat="trocken">Trockenprodukt</button>
                    <button class="filter-chip" data-cat="getraenke">Getränke</button>
                    <button class="filter-chip" data-cat="sonstiges">Sonstiges</button>
                </div>
            </div>
            
            <div class="list-container">
                <ul id="shopping-list" class="item-list sortable-list">
                    <!-- Items will be injected here -->
                </ul>
            </div>

            <!-- Floating Action Button -->
            <button id="fab-add" class="fab" aria-label="Neuer Eintrag">
                <svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </section>

        <!-- View: Favorites -->
        <section id="view-favorites" class="view">
            <div class="list-container">
                <p class="empty-state" id="empty-favorites" style="display: none;">Keine Favoriten vorhanden.</p>
                <ul id="favorites-list" class="item-list">
                    <!-- Favorite Items will be injected here -->
                </ul>
            </div>
        </section>

        <!-- View: Recipes -->
        <section id="view-recipes" class="view">
            <button id="btn-create-recipe" class="btn-primary full-width mb-15">Neues Rezept erstellen</button>
            <div class="list-container">
                <p class="empty-state" id="empty-recipes" style="display: none;">Keine Rezepte vorhanden.</p>
                <ul id="recipes-list" class="recipe-list">
                    <!-- Recipes will be injected here -->
                </ul>
            </div>
        </section>
        
        <!-- Recipe Detail Modal / View (Overlay) -->
        <div id="modal-recipe" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-recipe-title">Rezept</h2>
                    <button id="btn-close-modal" class="btn-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="recipe-portions">
                    <label>Portionen:</label>
                    <div class="portion-controls">
                        <button id="btn-portion-dec" class="btn-icon circle">-</button>
                        <span id="recipe-portions-count">2</span>
                        <button id="btn-portion-inc" class="btn-icon circle">+</button>
                    </div>
                </div>
                <h3>Zutaten</h3>
                <ul id="recipe-ingredients" class="item-list mb-15">
                    <!-- Ingredients here -->
                </ul>
                <button id="btn-add-recipe-to-list" class="btn-primary full-width">Alle Zutaten zur Liste hinzufügen</button>
            </div>
        </div>
        
        <!-- Create Recipe Modal -->
        <div id="modal-create-recipe" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Neues Rezept</h2>
                    <button id="btn-close-create-modal" class="btn-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <form id="form-create-recipe">
                    <div class="input-group mb-15">
                        <input type="text" id="input-recipe-name" placeholder="Rezeptname" required style="width: 100%;">
                    </div>
                    <div class="recipe-portions mb-15">
                        <label>Basis-Portionen:</label>
                        <input type="number" id="input-base-portions" value="2" min="1" required style="width: 60px; text-align: center;">
                    </div>
                    <h3>Zutaten</h3>
                    <div id="create-ingredients-list" class="mb-15">
                        <!-- Dynamic ingredient inputs -->
                    </div>
                    <button type="button" id="btn-add-ingredient-field" class="btn-secondary full-width mb-15">+ Zutat hinzufügen</button>
                    
                    <button type="submit" class="btn-primary full-width">Rezept speichern</button>
                </form>
            </div>
        </div>

        <!-- Add Item Modal -->
        <div id="modal-add-item" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Neuer Eintrag</h2>
                    <button id="btn-close-add-modal" class="btn-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <form id="form-add-item">
                    <div class="input-group mb-15">
                        <input type="text" id="input-item-name" placeholder="Was brauchst du?" required style="flex-grow: 1;" autocomplete="off">
                    </div>
                    <div class="input-group mb-15">
                        <input type="text" id="input-item-amount" placeholder="Menge (z.B. 2, 500g)" style="flex-grow: 1;" autocomplete="off">
                    </div>
                    <div class="input-group mb-15">
                        <select id="input-item-category" class="select-input" required>
                            <option value="sonstiges">Sonstiges</option>
                            <option value="obst">Obst & Gemüse</option>
                            <option value="kuehl">Kühlregal</option>
                            <option value="trocken">Trockensortiment</option>
                            <option value="getraenke">Getränke</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary full-width">Auf die Liste</button>
                </form>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="modal-settings" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Einstellungen</h2>
                    <button id="btn-close-settings-modal" class="btn-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="settings-group mb-15">
                    <h3>Erscheinungsbild</h3>
                    <div class="theme-toggle mt-10">
                        <span>Dunkler Modus</span>
                        <label class="switch">
                            <input type="checkbox" id="toggle-dark-mode">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-group mb-15">
                    <h3>Akzentfarbe</h3>
                    <div class="color-picker mt-10" id="color-picker-container">
                        <button class="color-swatch active" data-color="#60a5fa" style="background-color: #60a5fa;" aria-label="Soft Blue"></button>
                        <button class="color-swatch" data-color="#34d399" style="background-color: #34d399;" aria-label="Soft Mint"></button>
                        <button class="color-swatch" data-color="#fbbf24" style="background-color: #fbbf24;" aria-label="Soft Sand"></button>
                        <button class="color-swatch" data-color="#a78bfa" style="background-color: #a78bfa;" aria-label="Soft Lilac"></button>
                        <button class="color-swatch" data-color="#f472b6" style="background-color: #f472b6;" aria-label="Soft Rose"></button>
                        <button class="color-swatch" data-color="#9ca3af" style="background-color: #9ca3af;" aria-label="Minimalist Gray"></button>
                    </div>
                    <p class="settings-hint">Wähle eine dezente Farbe, die dir gefällt.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="view-list">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>Liste</span>
        </button>
        <button class="nav-item" data-target="view-favorites">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span>Favoriten</span>
        </button>
        <button class="nav-item" data-target="view-recipes">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            <span>Rezepte</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="./js/db.js" type="module"></script>
    <script src="./js/app.js" type="module"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('ServiceWorker registered:', reg.scope);
                }).catch(err => {
                    console.log('ServiceWorker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
